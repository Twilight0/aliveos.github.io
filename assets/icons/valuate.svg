<?xml version="1.0" encoding="UTF-8"?>
<svg width="128" height="128" viewBox="0 0 128 128" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#10B981;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#059669;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Rounded rectangle background -->
  <rect width="128" height="128" rx="24" fill="url(#grad)"/>

  <!-- Calculator body -->
  <rect x="32" y="18" width="64" height="92" rx="8" fill="white" opacity="0.95"/>

  <!-- Display -->
  <rect x="40" y="26" width="48" height="22" rx="4" fill="#059669" opacity="0.8"/>
  <text x="64" y="42" font-family="monospace" font-size="14" fill="white" text-anchor="middle" font-weight="bold">42</text>

  <!-- Buttons row 1 -->
  <rect x="40" y="56" width="12" height="12" rx="3" fill="#D1FAE5"/>
  <rect x="58" y="56" width="12" height="12" rx="3" fill="#D1FAE5"/>
  <rect x="76" y="56" width="12" height="12" rx="3" fill="#FEE2E2"/>

  <!-- Buttons row 2 -->
  <rect x="40" y="74" width="12" height="12" rx="3" fill="#D1FAE5"/>
  <rect x="58" y="74" width="12" height="12" rx="3" fill="#D1FAE5"/>
  <rect x="76" y="74" width="12" height="12" rx="3" fill="#FEE2E2"/>

  <!-- Buttons row 3 -->
  <rect x="40" y="92" width="12" height="12" rx="3" fill="#D1FAE5"/>
  <rect x="58" y="92" width="12" height="12" rx="3" fill="#D1FAE5"/>
  <rect x="76" y="92" width="12" height="12" rx="3" fill="#059669"/>

  <!-- Button labels -->
  <text x="46" y="65" font-family="sans-serif" font-size="8" fill="#059669" text-anchor="middle">7</text>
  <text x="64" y="65" font-family="sans-serif" font-size="8" fill="#059669" text-anchor="middle">8</text>
  <text x="82" y="65" font-family="sans-serif" font-size="8" fill="#DC2626" text-anchor="middle">+</text>
  <text x="46" y="83" font-family="sans-serif" font-size="8" fill="#059669" text-anchor="middle">4</text>
  <text x="64" y="83" font-family="sans-serif" font-size="8" fill="#059669" text-anchor="middle">5</text>
  <text x="82" y="83" font-family="sans-serif" font-size="8" fill="#DC2626" text-anchor="middle">-</text>
  <text x="46" y="101" font-family="sans-serif" font-size="8" fill="#059669" text-anchor="middle">1</text>
  <text x="64" y="101" font-family="sans-serif" font-size="8" fill="#059669" text-anchor="middle">2</text>
  <text x="82" y="101" font-family="sans-serif" font-size="8" fill="white" text-anchor="middle" font-weight="bold">=</text>
</svg>
