<?xml version="1.0" encoding="UTF-8"?>
<svg width="128" height="128" viewBox="0 0 128 128" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F59E0B;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#D97706;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Rounded rectangle background -->
  <rect width="128" height="128" rx="24" fill="url(#grad)"/>

  <!-- Phone outline -->
  <rect x="38" y="18" width="36" height="64" rx="6" fill="white" opacity="0.95"/>
  <rect x="42" y="26" width="28" height="44" rx="2" fill="#D97706" opacity="0.3"/>

  <!-- Phone screen content - notification bars -->
  <rect x="44" y="30" width="24" height="4" rx="1" fill="#D97706" opacity="0.5"/>
  <rect x="44" y="38" width="18" height="3" rx="1" fill="#D97706" opacity="0.3"/>
  <rect x="44" y="44" width="20" height="3" rx="1" fill="#D97706" opacity="0.3"/>

  <!-- Phone home button -->
  <circle cx="56" cy="76" r="3" fill="#D97706" opacity="0.4"/>

  <!-- Laptop outline -->
  <rect x="72" y="38" width="36" height="24" rx="3" fill="white" opacity="0.95"/>
  <rect x="75" y="41" width="30" height="18" rx="1" fill="#D97706" opacity="0.3"/>
  <rect x="68" y="62" width="44" height="4" rx="2" fill="white" opacity="0.7"/>

  <!-- Connection arrows -->
  <path d="M 72 50 L 78 50" stroke="white" stroke-width="2" stroke-linecap="round" opacity="0.9"/>
  <path d="M 75 47 L 78 50 L 75 53" stroke="white" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round" opacity="0.9"/>

  <path d="M 72 56 L 68 56" stroke="white" stroke-width="2" stroke-linecap="round" opacity="0.7"/>
  <path d="M 69 53 L 66 56 L 69 59" stroke="white" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round" opacity="0.7"/>

  <!-- Signal waves -->
  <path d="M 50 88 C 50 88 56 96 64 88" stroke="white" stroke-width="2" fill="none" stroke-linecap="round" opacity="0.6"/>
  <path d="M 46 94 C 46 94 56 106 72 94" stroke="white" stroke-width="2" fill="none" stroke-linecap="round" opacity="0.4"/>
</svg>
