---
layout: default
---
<article class="post">
    <header class="post-header">
        <h2 class="post-title">{{ page.title }}</h2>
        <p class="post-meta">
            {{ page.date | date: "%B %d, %Y" }}{% if page.author %} &middot; {{ page.author }}{% endif %}
        </p>
    </header>
    <div class="post-content">
        {{ content }}
    </div>
    <p class="post-back"><a href="/news/">&larr; Back to News</a></p>
</article>
