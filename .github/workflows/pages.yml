name: pages build and deployment

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Fetch profile README
        run: |
          curl -sL "https://raw.githubusercontent.com/Twilight0/Twilight0/master/README.md" > /tmp/profile-readme.md
          cat > about.md << 'EOF'
---
layout: default
title: About Me
---
EOF
          cat /tmp/profile-readme.md >> about.md

      - name: Build with Jekyll
        uses: actions/jekyll-build-pages@v1
        with:
          source: ./
          destination: ./_site

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
